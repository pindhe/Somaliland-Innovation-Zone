<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Application Update</title></head>
<body style="font-family: system-ui, sans-serif; color: #0f172a;">
  <div style="max-width: 560px; margin: 0 auto; padding: 24px;">
    <h1>Application update</h1>
    <p>Hello {{ application.first_name }},</p>
    <p>Regarding application <strong>{{ application.application_number }}</strong> for <strong>{{ course.title }}</strong>.</p>
    <p>Status: <strong>{{ application.get_status_display }}</strong></p>
    <p>Thank you for your interest in Somaliland Innovation Zone.</p>
  </div>
</body>
</html>
