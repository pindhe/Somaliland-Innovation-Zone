{% extends "portal/base_portal.html" %}
{% block title %}Settings – SIZ Admin{% endblock %}
{% block content %}
<h1 class="font-display text-2xl font-bold mb-6">Organization settings</h1>
<form method="post" enctype="multipart/form-data" class="card-soft p-6 max-w-2xl space-y-4">
  {% csrf_token %}
  {% for field in form %}
  <div>
    <label class="text-sm font-medium mb-1 block">{{ field.label }}</label>
    {{ field }}
    {% if field.errors %}<p class="text-red-500 text-xs">{{ field.errors.0 }}</p>{% endif %}
  </div>
  {% endfor %}
  <button type="submit" class="btn btn-primary">Save settings</button>
</form>
{% endblock %}
